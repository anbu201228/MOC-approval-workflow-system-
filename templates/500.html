{% extends "base.html" %}

{% block title %}Server Error - ALSTOM{% endblock %}

{% block content %}
<div class="container" style="text-align: center; padding: 100px 20px;">
    <i class="fas fa-server" style="font-size: 80px; color: var(--secondary-red); margin-bottom: 20px;"></i>
    <h1 style="color: var(--primary-dark); margin-bottom: 20px;">500 - Server Error</h1>
    <p style="color: #666; margin-bottom: 30px; max-width: 500px; margin: 0 auto 30px;">
        Something went wrong on our server. Please try again later or contact system administrator.
    </p>
    <div style="display: flex; gap: 10px; justify-content: center;">
        <a href="{{ url_for('dashboard') }}" class="btn btn-primary">
            <i class="fas fa-tachometer-alt"></i> Go to Dashboard
        </a>
        <a href="{{ url_for('index') }}" class="btn" style="background: #f8f9fa;">
            <i class="fas fa-home"></i> Go to Home
        </a>
    </div>
</div>
{% endblock %}
